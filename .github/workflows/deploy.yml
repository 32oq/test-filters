name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Force all actions to use Node.js 24 runtime.
# actions/checkout@v4 and actions/upload-artifact@v4 currently bundle Node 20;
# this env var tells the runner to use Node 24 instead (required from June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7
